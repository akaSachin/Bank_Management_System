{% extends "base.html" %}
{% block content %}
<div class="transactions">
    <h2>Transaction History</h2>
    <table>
        <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Date</th>
        </tr>
        {% for t in transactions %}
        <tr>
            <td class="{{ 'deposit' if t[0]=='deposit' else 'withdraw' }}">{{ t[0].capitalize() }}</td>
            <td>₹{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
